services:
  - type: web
    name: rancho-chatbot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_TEMPERATURE
        value: "0.3"
      - key: GROQ_MAX_TOKENS
        value: "1024"
      - key: GROQ_TOP_P
        value: "0.9"
      - key: SCRAPE_BASE_URL
        value: https://ranczo-dziki-sad.pl
      - key: SCRAPE_SUBPAGES
        value: /o-nas,/oferta,/atrakcje-w-okolicy,/kontakt
